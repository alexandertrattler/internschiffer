<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agency Landscape</title>
    <link rel="stylesheet" href="styles.css?v=info-preview-3">
  </head>
  <body>
    <header class="meta-console" aria-label="Kennzahlen">
      <strong class="brand-mark">internschiffer</strong>
      <div class="meta-stats">
        <span><strong id="statTotal">0</strong> Einträge</span>
        <span><strong id="statShown">0</strong> sichtbar</span>
        <span><strong id="statShortlist">0</strong> Shortlist</span>
      </div>
    </header>

    <main class="app-shell">
      <aside class="filters" aria-label="Filter">
        <label class="search">
          <span class="filter-heading">Suche</span>
          <input id="searchInput" type="search" placeholder="Firma, Ort, Domain, Profil, Tags">
        </label>

        <section>
          <h2>Themen</h2>
          <div id="capabilityFilters" class="chip-grid"></div>
        </section>

        <section>
          <h2>Städte</h2>
          <div id="cityFilters" class="chip-grid"></div>
        </section>

        <section>
          <h2>Länder</h2>
          <div id="countryFilters" class="chip-grid"></div>
        </section>
      </aside>
      <div id="filterResizeHandle" class="resize-handle" aria-hidden="true"></div>

      <section class="workspace">
        <div class="cards-toolbar">
          <div class="sort-control" aria-label="Sortierung">
            <button id="resetFilters" class="sort-option reset-option" type="button">Reset</button>
            <button class="sort-option active" type="button" data-sort="name">A-Z</button>
            <button class="sort-option placeholder" type="button" disabled>Kategorie 1</button>
            <button class="sort-option placeholder" type="button" disabled>Kategorie 2</button>
          </div>
          <button id="shortlistFilter" class="chip shortlist-filter" type="button">
            <span>Nur Shortlist</span><span id="shortlistFilterCount" class="chip-count">0</span>
          </button>
        </div>

        <p id="emptyState" class="empty-detail" hidden>Keine Agentur passt zu den aktuellen Filtern.</p>
        <div id="cardsGrid" class="cards-grid"></div>
      </section>
    </main>

    <script src="data.js?v=info-preview-3"></script>
    <script src="app.js?v=info-preview-3"></script>
  </body>
</html>
